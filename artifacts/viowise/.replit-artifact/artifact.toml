kind = "web"
previewPath = "/"
title = "Viowise"
version = "1.0.0"
id = "artifacts/viowise"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21080

[services.development]
run = "pnpm --filter @workspace/viowise run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/viowise", "run", "build" ]
publicDir = "artifacts/viowise/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21080"
BASE_PATH = "/"
